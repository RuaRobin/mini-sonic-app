<div class="edit-container">

  <!-- Header -->
  <div class="edit-header">
    <div class="edit-title-group">
      <span class="edit-label">Edit Operation</span>
      <h2 class="edit-title">{{ data.operationID }}</h2>
    </div>
    <button class="close-btn" (click)="cancel()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content class="edit-body">
    <form [formGroup]="form">

      <!-- General fields -->
      <div class="fields-grid">

        <div class="field-item">
          <label class="field-label">Type*</label>
          <select class="field-select" formControlName="operationType">
            <option *ngFor="let t of operationTypes" [value]="t">{{ t }}</option>
          </select>
        </div>

        <div class="field-item">
          <label class="field-label">Customer*</label>
          <input class="field-input" formControlName="operationCustomer" placeholder="Customer name" />
        </div>

        <div class="field-item">
          <label class="field-label">Date*</label>
          <input class="field-input" type="date" formControlName="operationDate" />
        </div>

        <div class="field-item">
          <label class="field-label">Notes (Optional)</label>
          <input class="field-input notes-input" formControlName="notes" placeholder="—" />
        </div>

      </div>

      <!-- Items table -->
      <div class="section-divider">
        <span>Items</span>
      </div>

      <div formGroupName="quantities">
        <table class="items-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Unit Price</th>
              <th>Qty</th>
              <th>Tax (%)</th>
              <th>Line Total</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of paginatedItems">
              <td>{{ item.itemName }}</td>
              <td>{{ item.unitPrice | currency }}</td>
              <td>
                <input class="cell-input qty-input" type="number" [formControlName]="item.itemName" min="0" />
              </td>
              <td>
                {{item.tax}}%
              </td>
              <td>
                <span class="line-total">{{ lineTotal(item) | currency }}</span>
              </td>
            </tr>
          </tbody>
        </table>
        <mat-paginator [length]="itemsInStock.length" [pageSize]="pageSize" (page)="onPageChange($event)"
          showFirstLastButtons></mat-paginator>
      </div>

      <!-- Totals -->
         <div class="totals">
        <div class="total-row">
          <span>Net Total</span>
          <span>{{ netTotal | currency }}</span>
        </div>
        <div class="total-row gross">
          <span>Gross Total</span>
          <span>{{ grossTotal | currency }}</span>
        </div>
      </div>

    </form>
  </mat-dialog-content>

  <!-- Footer -->
  <mat-dialog-actions class="edit-footer">
    <button mat-stroked-button (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" (click)="save()" [disabled]="form.invalid">
      Save Changes
    </button>
  </mat-dialog-actions>

</div>
