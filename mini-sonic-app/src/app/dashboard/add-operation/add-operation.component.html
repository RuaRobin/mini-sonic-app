<div class="page-container">

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-left">
      <button class="back-btn" (click)="cancel()">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <div>
        <span class="page-label">Operations</span>
        <h1 class="page-title">New Operation</h1>
      </div>
    </div>
  </div>

  <!-- Form Card -->
  <div class="form-card">
    <form [formGroup]="form">

      <!-- Section: General Info -->
      <div class="section-title">General Information</div>
      <div class="fields-grid">

        <div class="field-item">
          <label class="field-label">Operation Type*</label>
          <select class="field-select" formControlName="operationType">
            <option *ngFor="let t of operationTypes" [value]="t">{{ t }}</option>
          </select>
        </div>

        <div class="field-item">
          <label class="field-label">Customer*</label>
          <input
            class="field-input"
            formControlName="operationCustomer"
            placeholder="Enter customer name"
          />
        </div>

        <div class="field-item">
          <label class="field-label">Date*</label>
          <input class="field-input" type="date" formControlName="operationDate" />
        </div>

        <div class="field-item">
          <label class="field-label">Notes (Optional)</label>
          <input
            class="field-input notes-input"
            formControlName="notes"
            placeholder="Optional notes"
          />
        </div>

      </div>

      <!-- Section: Items -->
      <div class="section-divider">
        <span>Items</span>
      </div>

      <div formGroupName="quantities">
        <table class="items-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Unit Price</th>
              <th>Qty</th>
              <th>Line Total</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of itemsInStock">
              <td>{{ item.itemName }}</td>
              <td>{{ item.unitPrice | currency }}</td>
              <td>
                <input
                  class="cell-input qty-input"
                  type="number"
                  [formControlName]="item.itemName"
                  min="0"
                />
              </td>
              <td>
                <span class="line-total">{{ lineTotal(item) | currency }}</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Totals -->
      <div class="totals">
        <div class="total-row">
          <span>Net Total</span>
          <span>{{ netTotal | currency }}</span>
        </div>
        <div class="total-row gross">
          <span>Gross Total</span>
          <span>{{ grossTotal | currency }}</span>
        </div>
      </div>

    </form>
  </div>

  <div class="page-header-actions">
    <button class="btn-cancel" (click)="cancel()">Cancel</button>
    <button class="btn-save" (click)="save()" [disabled]="form.invalid">
      Save Operation
    </button>
  </div>

</div>
